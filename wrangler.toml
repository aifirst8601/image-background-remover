name = "image-background-remover"
main = "./.worker-next/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "image-bg-db"
database_id = "f45f168f-43a9-42c8-b5ab-eb9e319629da"

# Environment variables for NextAuth
[env.production.vars]
NEXTAUTH_URL = "https://image-background-remover.pages.dev"
NEXTAUTH_SECRET = "your-secret-key-here"

[env.preview.vars]
NEXTAUTH_URL = "https://preview.image-background-remover.pages.dev"
NEXTAUTH_SECRET = "your-secret-key-here"